<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Universe — Every AI Tool, One Place</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#040811;--s1:#0a0f1c;--s2:#101828;--s3:#16213a;
  --bdr:rgba(255,255,255,0.06);--bdr-hi:rgba(99,179,237,0.4);
  --txt:#e2eaf5;--m1:#4a5568;--m2:#7b8fa6;
  --c:#38bdf8;--p:#8b5cf6;--a:#f59e0b;
  --g:#10b981;--r:#f43f5e;--pk:#ec4899;--ind:#6366f1;
  --blur:blur(20px);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;}

/* ── CANVAS BG ── */
#bg-canvas{position:fixed;inset:0;z-index:0;opacity:.55;}

/* ── GLASS UTIL ── */
.glass{background:rgba(10,15,28,0.72);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--bdr);}

/* ── MAIN ── */
main{position:relative;z-index:1;}

/* ── HERO ── */
.hero{padding:72px 48px 0;text-align:center;max-width:1480px;margin:0 auto;}

.hero-badge{
  display:inline-flex;align-items:center;gap:10px;
  font-size:10px;letter-spacing:3.5px;text-transform:uppercase;color:var(--c);
  padding:8px 20px;border-radius:100px;margin-bottom:36px;
  background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.25);
  animation:fadeUp .8s ease both;
}
.pulse-dot{width:7px;height:7px;border-radius:50%;background:var(--c);
  box-shadow:0 0 10px var(--c);animation:pulse 2.2s infinite;}

h1{
  font-family:'Syne',sans-serif;
  font-size:clamp(44px,6vw,90px);
  font-weight:900;line-height:1.02;letter-spacing:-3px;
  animation:fadeUp .8s .1s ease both;
}
.grad-text{
  background:linear-gradient(135deg,#38bdf8 0%,#8b5cf6 45%,#ec4899 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.sub{
  margin-top:18px;color:var(--m2);font-size:14px;letter-spacing:.4px;line-height:1.7;
  animation:fadeUp .8s .2s ease both;
}

/* Stats */
.stats{
  display:flex;justify-content:center;gap:0;
  margin:44px auto 0;max-width:680px;
  border-radius:18px;overflow:hidden;
  border:1px solid var(--bdr);
  background:rgba(10,15,28,0.6);
  backdrop-filter:var(--blur);
  animation:fadeUp .8s .3s ease both;
}
.stat{flex:1;padding:22px 16px;text-align:center;position:relative;}
.stat+.stat::before{content:'';position:absolute;left:0;top:20%;height:60%;width:1px;background:var(--bdr);}
.stat-n{
  font-family:'Syne',sans-serif;font-size:32px;font-weight:900;
  background:linear-gradient(135deg,#38bdf8,#8b5cf6);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.stat-l{font-size:9px;letter-spacing:2.5px;color:var(--m1);text-transform:uppercase;margin-top:5px;}

/* ── SEARCH ── */
.search-wrap{
  max-width:640px;margin:40px auto 0;position:relative;
  animation:fadeUp .8s .4s ease both;
}
.search-wrap input{
  width:100%;
  background:rgba(10,15,28,0.8);
  border:1px solid var(--bdr);
  color:var(--txt);font-family:'Inter',sans-serif;font-size:14px;
  padding:16px 50px 16px 52px;border-radius:16px;
  outline:none;transition:.3s;letter-spacing:.2px;
  backdrop-filter:var(--blur);
}
.search-wrap input:focus{border-color:var(--c);box-shadow:0 0 0 4px rgba(56,189,248,.08),0 0 30px rgba(56,189,248,.06);}
.search-wrap input::placeholder{color:var(--m1);}
.si{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--m2);pointer-events:none;}
.si svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;}
.sclear{position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:var(--s2);border:1px solid var(--bdr);color:var(--m2);
  width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:12px;
  display:none;align-items:center;justify-content:center;transition:.2s;}
.sclear:hover{color:var(--r);border-color:var(--r);}
.sclear.show{display:flex;}

/* ── FILTERS ── */
.filter-zone{max-width:1480px;margin:32px auto 0;padding:0 48px;animation:fadeUp .8s .5s ease both;}
.cat-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:12px;}
.fb{
  font-family:'Inter',sans-serif;font-size:12px;font-weight:500;letter-spacing:.3px;
  padding:9px 20px;border-radius:10px;border:1px solid var(--bdr);
  background:rgba(10,15,28,0.6);color:var(--m2);cursor:pointer;
  transition:.25s;display:flex;align-items:center;gap:8px;
  backdrop-filter:var(--blur);white-space:nowrap;
}
.fb:hover{border-color:rgba(56,189,248,.3);color:var(--txt);}
.fb.on{background:rgba(56,189,248,.1);border-color:rgba(56,189,248,.4);color:var(--c);}
.fb .cdot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0;}
.fb .badge{background:rgba(255,255,255,0.07);border-radius:4px;padding:1px 6px;font-size:9px;letter-spacing:.5px;}

.price-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.pf{
  font-family:'Inter',sans-serif;font-size:11px;font-weight:500;letter-spacing:1px;
  padding:7px 18px;border-radius:8px;border:1px solid var(--bdr);
  background:rgba(10,15,28,0.6);cursor:pointer;transition:.25s;
  backdrop-filter:var(--blur);
}
.pf-free{color:var(--g);}
.pf-freemium{color:var(--a);}
.pf-paid{color:var(--r);}
.pf-free.on{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.4);}
.pf-freemium.on{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.4);}
.pf-paid.on{background:rgba(244,63,94,.1);border-color:rgba(244,63,94,.4);}

/* ── TOOLBAR ── */
.toolbar{
  max-width:1480px;margin:20px auto 0;padding:0 48px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
}
.res-info{font-size:12px;color:var(--m2);}
.res-info strong{color:var(--c);font-weight:600;}
.cmp-row{display:flex;align-items:center;gap:10px;}
.sel-pill{
  display:flex;align-items:center;gap:7px;
  background:rgba(10,15,28,0.6);border:1px solid var(--bdr);
  padding:6px 14px;border-radius:8px;font-size:11px;color:var(--m2);
}
.sel-num{
  width:20px;height:20px;border-radius:50%;background:var(--p);color:#fff;
  font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;
}
#cmpbtn{
  background:linear-gradient(135deg,var(--c),var(--p));color:#fff;border:none;
  font-family:'Inter',sans-serif;font-size:12px;font-weight:600;letter-spacing:.5px;
  padding:10px 24px;border-radius:10px;cursor:pointer;
  opacity:0;pointer-events:none;transition:.25s;
  box-shadow:0 4px 20px rgba(56,189,248,.2);
}
#cmpbtn.on{opacity:1;pointer-events:all;}
#cmpbtn:hover{filter:brightness(1.12);transform:translateY(-1px);}
#clrbtn{
  background:none;border:1px solid var(--bdr);color:var(--m2);
  font-family:'Inter',sans-serif;font-size:12px;padding:10px 16px;
  border-radius:10px;cursor:pointer;opacity:0;pointer-events:none;transition:.25s;
}
#clrbtn.on{opacity:1;pointer-events:all;}
#clrbtn:hover{border-color:var(--r);color:var(--r);}

/* ── GRID ── */
.grid-wrap{max-width:1480px;margin:24px auto 0;padding:0 48px 120px;}

/* Section headers */
.sec-hdr{
  display:flex;align-items:center;gap:14px;
  margin:36px 0 16px;
  font-family:'Syne',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--m2);
}
.sec-hdr .sec-line{flex:1;height:1px;background:linear-gradient(90deg,var(--bdr),transparent);}
.sec-hdr .sec-icon{
  width:28px;height:28px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-size:14px;flex-shrink:0;border:1px solid;
}

/* The Grid */
.ai-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(275px,1fr));
  gap:14px;
}

/* ── CARD ── */
.card{
  position:relative;border-radius:18px;
  background:rgba(10,15,28,0.75);
  border:1px solid var(--bdr);
  padding:22px;cursor:pointer;
  transition:transform .28s cubic-bezier(.22,.68,0,1.2),
             border-color .28s,box-shadow .28s;
  overflow:hidden;
  display:flex;flex-direction:column;gap:14px;
  backdrop-filter:blur(12px);
  animation:cardIn .5s ease both;
}
/* Gradient shimmer on hover */
.card::before{
  content:'';position:absolute;inset:-1px;border-radius:19px;
  background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,0.025));
  pointer-events:none;transition:opacity .3s;opacity:0;
}
.card:hover::before{opacity:1;}
.card:hover{
  transform:translateY(-5px) scale(1.01);
  box-shadow:0 20px 60px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.06);
}
/* Brand glow on hover — set via JS inline style */
.card.picked{
  border-color:var(--c) !important;
  box-shadow:0 0 0 2px rgba(56,189,248,.2),0 20px 60px rgba(0,0,0,.6);
}
.pick-ck{
  position:absolute;top:12px;right:12px;
  width:24px;height:24px;border-radius:50%;
  background:var(--c);color:#050810;font-size:12px;font-weight:900;
  display:none;align-items:center;justify-content:center;z-index:3;
  box-shadow:0 0 12px var(--c);
}
.card.picked .pick-ck{display:flex;}

/* Logo */
.logo-wrap{
  width:52px;height:52px;border-radius:14px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  border:1px solid rgba(255,255,255,0.08);
}
.logo-wrap svg{width:28px;height:28px;}
.logo-wrap img{width:36px;height:36px;object-fit:contain;}

/* Card top */
.ct{display:flex;align-items:flex-start;gap:14px;}
.ci{flex:1;min-width:0;}
.cname{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.3px;}
.cco{font-size:10px;color:var(--m1);letter-spacing:1px;text-transform:uppercase;margin-top:3px;}

/* New badge */
.new-badge{
  position:absolute;top:-1px;left:12px;
  font-size:8px;letter-spacing:1.5px;font-weight:700;text-transform:uppercase;
  background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;
  padding:2px 7px;border-radius:0 0 6px 6px;
}

/* Description */
.cdesc{font-size:11.5px;color:var(--m2);line-height:1.75;flex:1;}

/* Tags */
.tags{display:flex;flex-wrap:wrap;gap:5px;}
.tag{
  font-size:9px;letter-spacing:.8px;padding:3px 9px;border-radius:5px;
  border:1px solid;text-transform:uppercase;font-weight:500;white-space:nowrap;
}

/* Card footer */
.cf{display:flex;align-items:center;justify-content:space-between;margin-top:auto;}
.price-lbl{font-size:10px;font-weight:600;display:flex;align-items:center;gap:5px;letter-spacing:.5px;}
.price-lbl::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;}
.p-free{color:var(--g);}
.p-freemium{color:var(--a);}
.p-paid{color:var(--r);}
.cf-right{display:flex;align-items:center;gap:8px;}
.stars{font-size:11px;color:var(--a);}
.vbtn{
  font-family:'Inter',sans-serif;font-size:10px;font-weight:600;letter-spacing:.8px;
  padding:7px 14px;border-radius:8px;border:1px solid var(--bdr);
  background:none;color:var(--m2);cursor:pointer;text-decoration:none;
  transition:.2s;display:inline-flex;align-items:center;gap:5px;
}
.vbtn:hover{border-color:var(--c);color:var(--c);background:rgba(56,189,248,.06);}
.vbtn svg{width:10px;height:10px;fill:none;stroke:currentColor;stroke-width:2.5;}

/* ── EMPTY ── */
.empty{text-align:center;padding:100px 20px;color:var(--m1);}
.empty-ico{font-size:56px;margin-bottom:20px;display:block;}

/* ── MODAL ── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.88);
  backdrop-filter:blur(20px);z-index:300;
  display:none;align-items:flex-start;justify-content:center;
  padding:40px 20px;overflow-y:auto;
}
.overlay.open{display:flex;}
.modal{
  background:var(--s1);border:1px solid rgba(255,255,255,.1);
  border-radius:24px;max-width:1080px;width:100%;padding:40px;
  position:relative;
  box-shadow:0 40px 120px rgba(0,0,0,.8),0 0 0 1px rgba(56,189,248,.08);
}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;}
.modal-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:900;}
.mclose{
  background:var(--s2);border:1px solid var(--bdr);color:var(--m2);
  width:36px;height:36px;border-radius:9px;cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;transition:.2s;
}
.mclose:hover{border-color:var(--r);color:var(--r);}
.ctable{width:100%;border-collapse:collapse;font-size:12px;}
.ctable th,.ctable td{padding:14px 16px;text-align:left;border-bottom:1px solid var(--bdr);vertical-align:top;}
.ctable th{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;background:var(--s2);border-radius:8px;}
.ctable td:first-child{font-size:9px;letter-spacing:1.5px;color:var(--m1);text-transform:uppercase;width:130px;white-space:nowrap;}

/* ── SCROLL TOP ── */
#stbtn{
  position:fixed;bottom:30px;right:30px;
  width:42px;height:42px;border-radius:12px;
  background:var(--s2);border:1px solid var(--bdr);color:var(--m2);
  cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;
  z-index:50;transition:.25s;opacity:0;pointer-events:none;
  box-shadow:0 8px 24px rgba(0,0,0,.4);
}
#stbtn.on{opacity:1;pointer-events:all;}
#stbtn:hover{border-color:var(--c);color:var(--c);box-shadow:0 8px 24px rgba(56,189,248,.2);}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.85);}}
@keyframes cardIn{from{opacity:0;transform:translateY(12px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}

/* Responsive */
@media(max-width:768px){
  .hero,.filter-zone,.toolbar,.grid-wrap{padding-left:18px;padding-right:18px;}
  .stats{max-width:100%;}
  .stat-n{font-size:24px;}
  h1{letter-spacing:-1.5px;}
  .modal{padding:22px;}
}
</style>
</head>
<body>

<!-- Neural Network Canvas -->
<canvas id="bg-canvas"></canvas>

<main>
<!-- HERO -->
<div class="hero">
  <div class="hero-badge">
    <span class="pulse-dot"></span>
    AI UNIVERSE &mdash; LIVE DIRECTORY
  </div>
  <h1>Every AI Tool.<br><span class="grad-text">One Universe.</span></h1>
  <p class="sub">100+ platforms across Chat, Images, Code, Video, Audio, Search, Productivity &amp; Design.<br>Filter, search, and compare side-by-side.</p>
  <div class="stats">
    <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l">Tools</div></div>
    <div class="stat"><div class="stat-n" id="s-showing">0</div><div class="stat-l">Showing</div></div>
    <div class="stat"><div class="stat-n">9</div><div class="stat-l">Categories</div></div>
    <div class="stat"><div class="stat-n">35+</div><div class="stat-l">Free Tiers</div></div>
  </div>
</div>

<!-- SEARCH -->
<div class="search-wrap">
  <span class="si">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  </span>
  <input type="text" id="q" placeholder="Search by name, company, feature, use case…" autocomplete="off">
  <button class="sclear" id="qclear">✕</button>
</div>

<!-- FILTERS -->
<div class="filter-zone">
  <div class="cat-row" id="cat-row">
    <button class="fb on" data-cat="all"><span class="cdot"></span>All Tools<span class="badge" id="cnt-all">0</span></button>
    <button class="fb" data-cat="chat"><span class="cdot"></span>Chat &amp; LLMs<span class="badge" id="cnt-chat"></span></button>
    <button class="fb" data-cat="image"><span class="cdot"></span>Image Gen<span class="badge" id="cnt-image"></span></button>
    <button class="fb" data-cat="code"><span class="cdot"></span>Coding<span class="badge" id="cnt-code"></span></button>
    <button class="fb" data-cat="video"><span class="cdot"></span>Video<span class="badge" id="cnt-video"></span></button>
    <button class="fb" data-cat="audio"><span class="cdot"></span>Audio &amp; Music<span class="badge" id="cnt-audio"></span></button>
    <button class="fb" data-cat="search"><span class="cdot"></span>AI Search<span class="badge" id="cnt-search"></span></button>
    <button class="fb" data-cat="productivity"><span class="cdot"></span>Productivity<span class="badge" id="cnt-productivity"></span></button>
    <button class="fb" data-cat="design"><span class="cdot"></span>Design &amp; UX<span class="badge" id="cnt-design"></span></button>
    <button class="fb" data-cat="research"><span class="cdot"></span>Research &amp; Data<span class="badge" id="cnt-research"></span></button>
  </div>
  <div class="price-row">
    <button class="pf pf-free" data-price="free">● FREE</button>
    <button class="pf pf-freemium" data-price="freemium">◐ FREEMIUM</button>
    <button class="pf pf-paid" data-price="paid">▶ PAID ONLY</button>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="res-info">Showing <strong id="res-n">0</strong> AI tools</div>
  <div class="cmp-row">
    <div class="sel-pill">
      <span class="sel-num" id="sel-n">0</span>
      <span>selected (max 3)</span>
    </div>
    <button id="cmpbtn">Compare Now →</button>
    <button id="clrbtn">Clear</button>
  </div>
</div>

<!-- GRID -->
<div class="grid-wrap" id="grid"></div>
</main>

<!-- COMPARE MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">⚡ Side-by-Side Comparison</div>
      <button class="mclose" id="mclose">✕</button>
    </div>
    <div id="mcontent"></div>
  </div>
</div>
<button id="stbtn">↑</button>

<script>
// ════════════════════════════════════════════════════
//  SVG LOGO LIBRARY — brand-accurate inline SVGs
// ════════════════════════════════════════════════════
const LOGOS = {
  // OpenAI — O shape
  openai:`<svg viewBox="0 0 28 28" fill="none"><path d="M14 3a5.5 5.5 0 0 1 5.18 3.64A5.5 5.5 0 0 1 22.5 14a5.5 5.5 0 0 1-3.32 5.04A5.5 5.5 0 0 1 14 22a5.5 5.5 0 0 1-5.18-3.64A5.5 5.5 0 0 1 5.5 11a5.5 5.5 0 0 1 3.32-5.04A5.5 5.5 0 0 1 14 3z" stroke="#10a37f" stroke-width="1.8"/><circle cx="14" cy="14" r="3.5" fill="#10a37f"/><path d="M14 8.5V5M14 23v-3.5M19.5 14H23M5 14h3.5M17.9 10.1l2.1-2.1M8 19.9l2.1-2.1M17.9 17.9l2.1 2.1M8 8.1l2.1 2.1" stroke="#10a37f" stroke-width="1.5" stroke-linecap="round"/></svg>`,
  // Anthropic — diamond lattice

const CAT_COLOR={chat:'#38bdf8',image:'#ec4899',code:'#22c55e',video:'#f59e0b',
  audio:'#8b5cf6',search:'#6366f1',productivity:'#f43f5e',design:'#f97316',research:'#10b981'};
const CAT_ORDER=['chat','image','code','video','audio','search','productivity','design','research'];

// ════════════════════════════════════════════════════
//  CANVAS — Neural Network Background
// ════════════════════════════════════════════════════
(function(){
  const canvas=document.getElementById('bg-canvas');
  const ctx=canvas.getContext('2d');
  let W,H,particles=[];
  const N=90,CONN=130,SPEED=.25;

  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);

  for(let i=0;i<N;i++) particles.push({
    x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,
    vx:(Math.random()-.5)*SPEED,vy:(Math.random()-.5)*SPEED,
    r:Math.random()*1.5+.5,
    hue:180+Math.random()*120
  });

  function frame(){
    ctx.clearRect(0,0,W,H);
    for(let i=0;i<N;i++){
      const p=particles[i];
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>W)p.vx*=-1;
      if(p.y<0||p.y>H)p.vy*=-1;
      // draw particle
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`hsla(${p.hue},80%,70%,.7)`;
      ctx.fill();
      // draw connections
      for(let j=i+1;j<N;j++){
        const q=particles[j];
        const dx=p.x-q.x,dy=p.y-q.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<CONN){
          const alpha=(1-d/CONN)*.25;
          ctx.beginPath();
          ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);
          ctx.strokeStyle=`hsla(${(p.hue+q.hue)/2},70%,65%,${alpha})`;
          ctx.lineWidth=.8;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(frame);
  }
  frame();
})();

// ════════════════════════════════════════════════════
//  FILTER ENGINE
// ════════════════════════════════════════════════════
function getFiltered(){
  const q=query.trim().toLowerCase();
  return DATA.filter(d=>{
    if(activeCat!=='all'&&d.cat!==activeCat)return false;
    if(activePrices.size>0&&!activePrices.has(d.price))return false;
    if(q){
      const blob=[d.name,d.company,d.desc,d.strengths,...d.tags].join(' ').toLowerCase();
      if(!blob.includes(q))return false;
    }
    return true;
  });
}

// ════════════════════════════════════════════════════
//  RENDER HELPERS
// ════════════════════════════════════════════════════
function stars(r){return'★'.repeat(r)+'☆'.repeat(5-r);}
function pClass(p){return p==='free'?'p-free':p==='freemium'?'p-freemium':'p-paid';}
function pLabel(p){return p==='free'?'FREE':p==='freemium'?'FREEMIUM':'PAID';}
function getLogo(key){return LOGOS[key]||LOGOS.default;}

function cardHTML(ai,delay){
  const cc=CAT_COLOR[ai.cat]||'#38bdf8';
  const sel=picked.has(ai.id)?'picked':'';
  return `<div class="card ${sel}" data-id="${ai.id}" style="animation-delay:${delay}s">
    ${ai.isNew?'<div class="new-badge">NEW</div>':''}
    <div class="pick-ck">✓</div>
    <div class="ct">
      <div class="logo-wrap" style="background:${ai.bg}18;border-color:${ai.bg}30;">
        ${getLogo(ai.logoKey)}
      </div>
      <div class="ci">
        <div class="cname">${ai.name}</div>
        <div class="cco">${ai.company}</div>
      </div>
    </div>
    <p class="cdesc">${ai.desc}</p>
    <div class="tags">${ai.tags.slice(0,4).map(t=>`<span class="tag" style="color:${cc};border-color:${cc}28;background:${cc}0c;">${t}</span>`).join('')}</div>
    <div class="cf">
      <span class="price-lbl ${pClass(ai.price)}">${pLabel(ai.price)}</span>
      <div class="cf-right">
        <span class="stars">${stars(ai.rating)}</span>
        <a class="vbtn" href="${ai.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
          Visit<svg viewBox="0 0 12 12"><path d="M2 10 L10 2 M5 2 H10 V7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
      </div>
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════
//  MAIN RENDER
// ════════════════════════════════════════════════════
function render(){
  const filtered=getFiltered();
  const q=query.trim().toLowerCase();
  document.getElementById('res-n').textContent=filtered.length;
  document.getElementById('s-showing').textContent=filtered.length;

  // Update counts
  const allCount=DATA.filter(d=>{
    if(activePrices.size>0&&!activePrices.has(d.price))return false;
    if(q){const b=[d.name,d.company,d.desc,d.strengths,...d.tags].join(' ').toLowerCase();if(!b.includes(q))return false;}
    return true;
  }).length;
  document.getElementById('cnt-all').textContent=allCount;

  CAT_ORDER.forEach(cat=>{
    const el=document.getElementById('cnt-'+cat);
    if(!el)return;
    const n=DATA.filter(d=>{
      if(d.cat!==cat)return false;
      if(activePrices.size>0&&!activePrices.has(d.price))return false;
      if(q){const b=[d.name,d.company,d.desc,d.strengths,...d.tags].join(' ').toLowerCase();if(!b.includes(q))return false;}
      return true;
    }).length;
    el.textContent=n;
  });

  const grid=document.getElementById('grid');
  if(filtered.length===0){
    grid.innerHTML=`<div class="empty"><span class="empty-ico">🔭</span><p style="font-size:14px;color:var(--m2)">No AI tools match your search.<br><span style="font-size:12px;color:var(--m1)">Try a different keyword or clear the filters.</span></p></div>`;
    return;
  }

  // Group by category when showing all with no active search/price filters
  const showGrouped=activeCat==='all'&&!q&&activePrices.size===0;

  if(showGrouped){
    let html='';
    CAT_ORDER.forEach(cat=>{
      const items=filtered.filter(d=>d.cat===cat);
      if(!items.length)return;
      const cc=CAT_COLOR[cat];
      html+=`<div class="sec-hdr">
        <span class="sec-icon" style="color:${cc};border-color:${cc}35;background:${cc}12;">${getCatIcon(cat)}</span>
        ${CATS[cat]}
        <span style="font-size:10px;color:var(--m1);letter-spacing:1px;">${items.length} tools</span>
        <div class="sec-line"></div>
      </div>
      <div class="ai-grid">${items.map((ai,i)=>cardHTML(ai,i*.025)).join('')}</div>`;
    });
    grid.innerHTML=html;
  } else {
    grid.innerHTML=`<div class="ai-grid">${filtered.map((ai,i)=>cardHTML(ai,i*.02)).join('')}</div>`;
  }

  // Attach hover glow
  grid.querySelectorAll('.card').forEach(c=>{
    const id=c.dataset.id;
    const ai=DATA.find(d=>d.id===id);
    if(ai){
      c.addEventListener('mouseenter',()=>{if(!picked.has(id))c.style.borderColor=ai.bg+'55';});
      c.addEventListener('mouseleave',()=>{if(!picked.has(id))c.style.borderColor='';});
    }
    c.addEventListener('click',()=>togglePick(id));
  });
}

function getCatIcon(cat){
  const icons={chat:'💬',image:'🎨',code:'⌨️',video:'🎬',audio:'🎵',search:'🔍',productivity:'⚡',design:'✏️',research:'🔬'};
  return icons[cat]||'🤖';
}

// ════════════════════════════════════════════════════
//  PICK / COMPARE
// ════════════════════════════════════════════════════
function togglePick(id){
  if(picked.has(id)){picked.delete(id);}
  else{
    if(picked.size>=3){
      const n=document.getElementById('sel-n');
      n.style.background='#f43f5e';
      setTimeout(()=>n.style.background='var(--p)',600);
      return;
    }
    picked.add(id);
  }
  updateBar();
  document.querySelectorAll('.card').forEach(c=>{
    if(c.dataset.id===id){
      c.classList.toggle('picked',picked.has(id));
      c.querySelector('.pick-ck').style.display=picked.has(id)?'flex':'none';
      if(!picked.has(id))c.style.borderColor='';
    }
  });
}

function updateBar(){
  const n=picked.size;
  document.getElementById('sel-n').textContent=n;
  document.getElementById('cmpbtn').classList.toggle('on',n>=2);
  document.getElementById('clrbtn').classList.toggle('on',n>0);
}

function openCompare(){
  const items=[...picked].map(id=>DATA.find(d=>d.id===id)).filter(Boolean);
  const rows=[
    ['Company',items.map(a=>a.company)],
    ['Category',items.map(a=>CATS[a.cat])],
    ['Pricing',items.map(a=>`<span class="price-lbl ${pClass(a.price)}">${pLabel(a.price)}</span>`)],
    ['Rating',items.map(a=>`<span class="stars">${stars(a.rating)}</span> ${a.rating}/5`)],
    ['Context Window',items.map(a=>a.ctx||'—')],
    ['API Access',items.map(a=>a.api?'✅ Yes':'❌ No')],
    ['Key Features',items.map(a=>a.tags.slice(0,4).join(', '))],
    ['Best For',items.map(a=>a.strengths)],
    ['Website',items.map(a=>`<a href="${a.url}" target="_blank" style="color:var(--c);text-decoration:none;font-size:11px;">${a.url.replace('https://','')}</a>`)],
  ];
  document.getElementById('mcontent').innerHTML=`<div style="overflow-x:auto">
  <table class="ctable">
  <thead><tr><th style="background:transparent;border:none;"></th>
    ${items.map(a=>`<th style="min-width:180px"><div style="display:flex;align-items:center;gap:12px">
      <div style="width:40px;height:40px;border-radius:10px;background:${a.bg}18;border:1px solid ${a.bg}30;display:flex;align-items:center;justify-content:center;flex-shrink:0">${getLogo(a.logoKey)}</div>
      <div><div style="font-size:15px">${a.name}</div><div style="font-size:10px;color:var(--m1);font-weight:400;margin-top:2px">${a.company}</div></div>
    </div></th>`).join('')}
  </tr></thead><tbody>
  ${rows.map(([l,v])=>`<tr><td>${l}</td>${v.map(x=>`<td>${x}</td>`).join('')}</tr>`).join('')}
  </tbody></table></div>`;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

// ════════════════════════════════════════════════════
//  EVENTS
// ════════════════════════════════════════════════════
document.getElementById('cat-row').addEventListener('click',e=>{
  const b=e.target.closest('.fb');if(!b)return;
  document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');activeCat=b.dataset.cat;render();
});
document.querySelectorAll('.pf').forEach(b=>{
  b.addEventListener('click',()=>{
    const p=b.dataset.price;
    if(activePrices.has(p)){activePrices.delete(p);b.classList.remove('on');}
    else{activePrices.add(p);b.classList.add('on');}
    render();
  });
});
document.getElementById('q').addEventListener('input',e=>{
  query=e.target.value;
  document.getElementById('qclear').classList.toggle('show',query.length>0);
  render();
});
document.getElementById('qclear').addEventListener('click',()=>{
  query='';document.getElementById('q').value='';
  document.getElementById('qclear').classList.remove('show');render();
});
document.getElementById('cmpbtn').addEventListener('click',openCompare);
document.getElementById('clrbtn').addEventListener('click',()=>{picked.clear();updateBar();render();});
document.getElementById('mclose').addEventListener('click',()=>{document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';});
document.getElementById('overlay').addEventListener('click',e=>{if(e.target.id==='overlay'){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';}});
window.addEventListener('scroll',()=>document.getElementById('stbtn').classList.toggle('on',scrollY>300));
document.getElementById('stbtn').addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));

// ════════════════════════════════════════════════════
//  ANIMATED COUNTER
// ════════════════════════════════════════════════════
function countUp(el,target,dur){
  let start=0,step=target/((dur/16));
  const t=setInterval(()=>{
    start=Math.min(start+step,target);
    el.textContent=Math.floor(start);
    if(start>=target)clearInterval(t);
  },16);
}

// ════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════
countUp(document.getElementById('s-total'),DATA.length,1200);
document.getElementById('s-showing').textContent=DATA.length;
render();
</script>
</body>
</html>
